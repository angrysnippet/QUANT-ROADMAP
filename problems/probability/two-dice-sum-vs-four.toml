# Sample problem (mcq). Public section is client-safe; [server] is stripped by
# the seeder and never sent to the client before grading.

id = "two-dice-sum-vs-four"
track = "probability"
world = 1
day = 1
difficulty = 2
type = "mcq"
statement = """
You roll two fair six-sided dice. Which event is more likely?
"""
choices = [
  "A. The sum of the two dice equals 8",
  "B. At least one die shows a 4",
  "They are equally likely",
]
tags = ["probability", "counting", "sample-space"]
time_limit_seconds = 60

[server]
# 0-based index into `choices`. P(sum=8)=5/36; P(at least one 4)=11/36.
answer = 1
solution_explanation = """
There are 36 equally likely outcomes. Sum = 8 occurs for
(2,6),(3,5),(4,4),(5,3),(6,2) -> 5/36. "At least one 4" is the complement of
"no 4 on either die": 1 - (5/6)^2 = 1 - 25/36 = 11/36. Since 11/36 > 5/36,
event B is more likely.
"""
