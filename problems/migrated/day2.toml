# ---- Code (track dsa) ----

[[problems]]
id = "q_search"
track = "dsa"
world = 1
day = 2
difficulty = 1
type = "code"
tags = ["cpp", "arrays", "search"]
time_limit_seconds = 300
statement = """
Read N, then N integers, then a target T. Print the 0-based index of T, or -1 if absent.

Input:
```
5
10 20 30 40 50
30
```
"""
[problems.server]
answer = "2"
solution_explanation = "Scan left to right; print the first index whose value equals T, else -1."

