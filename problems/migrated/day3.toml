[[problems]]
id = "q_missing"
track = "dsa"
world = 1
day = 3
difficulty = 3
type = "code"
tags = ["cpp", "arrays", "math"]
time_limit_seconds = 300
statement = """
You are given N-1 distinct integers from 1..N (one is missing). Read N, then the N-1 integers. Print the missing number.

Input:
```
5
1 2 4 5
```
"""
[problems.server]
answer = "3"
solution_explanation = "Missing = N*(N+1)/2 minus the sum of the given values (15 - 12 = 3)."

